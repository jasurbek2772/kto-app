name: Build iOS IPA (No Signing)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Install Expo
        run: npm install -g expo-cli

      - name: Prebuild
        run: npx expo prebuild --platform ios

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Build iOS (no signing, safe mode)
        run: |
          cd ios
          SCHEME=$(xcodebuild -list | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          echo "Detected scheme: $SCHEME"
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Zip app
        run: |
          cd ios/build/Release-iphoneos
          zip -r app.zip *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/build/Release-iphoneos/app.zip
