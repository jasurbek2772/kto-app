name: iOS Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build IPA
        run: |
          # Устанавливаем сертификат в систему macOS на сервере
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision
          
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A
          security list-keychains -d user -s build.keychain
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Сама сборка (через Expo или xcodebuild)
          # Если у тебя Expo, используй:
          npx expo export:embed --platform ios --dev false
          # Если чистый React Native, напиши мне, я подправлю команду!

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: my-app-ipa
          path: build/*.ipa
