name: Build iOS IPA (No Signing)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Install Expo
        run: npm install -g expo-cli

      - name: Prebuild
        run: npx expo prebuild --platform ios

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Build .app (no signing)
        run: |
          cd ios
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme $(ls *.xcodeproj | sed 's/.xcodeproj//') \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip app
        run: |
          cd ios/build/Release-iphoneos
          zip -r app.zip *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-app
          path: ios/build/Release-iphoneos/app.zip
