name: iOS Build 2026
on:
  workflow_dispatch:

env:
  # Убираем предупреждение, включая поддержку Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Стабильная версия для 2026 года

      - name: Install Dependencies
        run: npm install

      - name: Prepare Certificates
        run: |
          # Декодируем твои секреты обратно в файлы
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision
          
          # Создаем связку ключей на удаленном маке
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          # Устанавливаем профиль в систему
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Create Export Options
        run: |
          # Этот файл критически важен для сборки .ipa
          # Мы создаем его "на лету"
          cat <<EOF > ios/exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.your.bundle.id</key>
                  <string>$(grep -aA1 "UUID" profile.mobileprovision | grep -o "[-A-Z0-9]\{36\}")</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: |
          # 1. Генерируем нативную папку ios (если её нет в гит)
          npx expo prebuild --platform ios --no-install
          
          # 2. Устанавливаем поды (CocoaPods)
          cd ios && pod install && cd ..

          # 3. Собираем архив (.xcarchive)
          # Мы жестко прописываем схему 'ktoapp', так как она стандартная для Expo
          xcodebuild -workspace ios/ktoapp.xcworkspace \
            -scheme "ktoapp" \
            -archivePath build/App.xcarchive \
            archive -sdk iphoneos -configuration Release \
            -allowProvisioningUpdates
          
          # 4. Экспортируем в .ipa
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/exportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: build/ipa/*.ipa
