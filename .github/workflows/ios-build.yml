name: iOS Build 2026
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Prepare Certificates
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision

          security create-keychain -p "build123" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "build123" build.keychain
          security import cert.p12 -k build.keychain \
            -P "${{ secrets.P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "build123" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Debug Signing
        if: always()
        shell: bash
        run: |
          echo "=== Keychains ==="
          security list-keychains
          
          echo "=== Identities in build.keychain ==="
          security find-identity -v build.keychain || echo "FAILED: can't read keychain"
          
          echo "=== Identities for codesigning ==="
          security find-identity -v -p codesigning || echo "FAILED: no codesigning identities"
          
          echo "=== Provisioning profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "FAILED: no profiles"
          
          echo "=== Profile decoded ==="
          security cms -D -i profile.mobileprovision 2>&1 | head -40 || echo "FAILED: can't decode profile"
      - name: Extract Signing Info
        id: signing
        # Явно bash — heredoc <<< не работает в sh
        shell: bash
        run: |
          # Декодируем профиль в читаемый plist во временный файл
          security cms -D -i profile.mobileprovision > /tmp/profile.plist

          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)

          # Ищем сертификат в keychain — берём первый iPhone Distribution/Developer
          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep -E "iPhone (Distribution|Developer)" \
            | head -1 \
            | sed -E 's/.*"(.+)"/\1/')

          # Проверяем что всё нашлось — иначе падаем здесь, не в xcodebuild
          if [ -z "$UUID" ];     then echo "ERROR: UUID not found";     exit 1; fi
          if [ -z "$TEAM_ID" ];  then echo "ERROR: TEAM_ID not found";  exit 1; fi
          if [ -z "$IDENTITY" ]; then echo "ERROR: IDENTITY not found"; exit 1; fi

          echo "UUID=$UUID"         >> $GITHUB_OUTPUT
          echo "TEAM_ID=$TEAM_ID"   >> $GITHUB_OUTPUT
          echo "IDENTITY=$IDENTITY" >> $GITHUB_OUTPUT

          echo "✅ UUID:     $UUID"
          echo "✅ TeamID:   $TEAM_ID"
          echo "✅ Identity: $IDENTITY"

      - name: Create Export Options
        shell: bash
        run: |
          mkdir -p ios
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ steps.signing.outputs.TEAM_ID }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.jabdu.ktoapp</key>
                  <string>${{ steps.signing.outputs.UUID }}</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Prebuild & Pod Install
        run: |
          npx expo prebuild --platform ios --no-install
          cd ios && pod install && cd ..

      - name: Archive
        # pipefail: exit code берётся из xcodebuild, а не из tee/grep
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/ktoapp.xcworkspace \
            -scheme "ktoapp" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=${{ steps.signing.outputs.IDENTITY }}" \
            "PROVISIONING_PROFILE=${{ steps.signing.outputs.UUID }}" \
            "DEVELOPMENT_TEAM=${{ steps.signing.outputs.TEAM_ID }}" \
            archive 2>&1 | tee build_archive.log
          
          # Показываем только ошибки если что-то пошло не так
          grep -E "^(error:|warning: .*(signing|provision|certificate))" build_archive.log || true

      - name: Export IPA
        shell: bash
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/exportOptions.plist \
            2>&1 | tee build_export.log

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: build/ipa/*.ipa

      # Загружаем логи ВСЕГДА — даже если сборка упала
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_archive.log
            build_export.log
