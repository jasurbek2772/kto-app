name: Build iOS (Expo)
on:
  workflow_dispatch: # Запуск вручную кнопкой в GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Убирает предупреждение о Node.js 20

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Install dependencies
        run: npm install

      - name: 4. Prebuild Expo (Генерация папки ios)
        # Эта команда создаст папку ios, которой у вас не было
        run: npx expo prebuild --platform ios

      - name: 5. Install CocoaPods
        working-directory: ios
        run: pod install

      - name: 6. Build App (.app для симулятора)
        # Собираем для симулятора, так как для реального устройства (.ipa) 
        # нужны платные сертификаты Apple
        run: |
          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme $(ls ios | grep .xcodeproj | cut -d. -f1) \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build
            
      - name: 7. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/Build/Products/Release-iphonesimulator/*.app
